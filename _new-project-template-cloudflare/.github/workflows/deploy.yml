name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SEO Check - Clean URLs
        run: |
          ERRORS=0

          echo "=== Checking for .html in href links ==="
          BAD_LINKS=$(grep -rn 'href="[^"#]*\.html' --include="*.html" . 2>/dev/null \
            | grep -v '\.css"' | grep -v '\.js"' | grep -v '.git/' \
            | grep -v 'href="https\?://' | grep -v '<!--' || true)
          if [ -z "$BAD_LINKS" ]; then
            echo "OK: No .html in href links"
          else
            echo "FAIL: Found .html in links (use clean URLs):"
            echo "$BAD_LINKS" | head -15
            ERRORS=$((ERRORS + 1))
          fi

          echo "=== Checking canonical URLs ==="
          BAD_CANONICAL=$(grep -rn 'rel="canonical".*\.html' --include="*.html" . 2>/dev/null | grep -v '.git/' || true)
          if [ -z "$BAD_CANONICAL" ]; then
            echo "OK: Canonical URLs clean"
          else
            echo "FAIL: Found .html in canonical URLs:"
            echo "$BAD_CANONICAL"
            ERRORS=$((ERRORS + 1))
          fi

          echo "=== Checking sitemap.xml ==="
          if [ -f "sitemap.xml" ]; then
            BAD_SITEMAP=$(grep '\.html' sitemap.xml || true)
            if [ -z "$BAD_SITEMAP" ]; then
              echo "OK: Sitemap clean"
            else
              echo "FAIL: Found .html in sitemap:"
              echo "$BAD_SITEMAP"
              ERRORS=$((ERRORS + 1))
            fi
          fi

          echo "=== Checking _redirects (warn if dangerous rules) ==="
          if [ -f "_redirects" ]; then
            DANGEROUS=$(grep -E '^\s*/\*\s+/:splat\.html' _redirects || true)
            if [ -n "$DANGEROUS" ]; then
              echo "FAIL: _redirects has wildcard '/* /:splat.html 200' rule."
              echo "  This causes infinite redirect loops with CF Pages native clean URLs."
              echo "  Remove it - CF Pages handles clean URLs automatically."
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: _redirects has no dangerous wildcard rules"
            fi
          else
            echo "OK: No _redirects file (CF Pages clean URLs work natively)"
          fi

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "DEPLOY BLOCKED: $ERRORS SEO issue(s) found. Fix and push again."
            exit 1
          fi
          echo ""
          echo "All SEO checks passed!"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy . --project-name=${{ secrets.CF_PROJECT_NAME }} --branch=main
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CF_GLOBAL_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CF_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
